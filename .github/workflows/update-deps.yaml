name: Update Dependencies

on:
  schedule:
    - cron: '0 23 * * 6'  # 9:00 AM AEST (UTC+10) every Sunday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Check for updates
        id: check
        run: |
          if ./scripts/check-updates.sh; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply updates
        id: apply
        if: steps.check.outputs.has_updates == 'true'
        run: |
          OUTPUT=$(./scripts/apply-updates.sh 2>&1)
          echo "$OUTPUT"
          echo "apply_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(grep -oP '^version: \K[0-9.]+' socket-proxy/config.yaml)
          BRANCH="chore/update-deps-$(date +%Y-%m-%d)"

          git config user.name "fergus"
          git config user.email "fstevens@intervl.com"
          git checkout -b "$BRANCH"
          git add socket-proxy/Dockerfile socket-proxy/build.yaml socket-proxy/config.yaml \
                  socket-proxy/rootfs/etc/services.d/socket-proxy/run \
                  .github/workflows/ci.yaml
          git commit -m "chore: bump dependencies to v${NEW_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump dependencies to v${NEW_VERSION}" \
            --base main \
            --body "$(cat <<EOF
          ## Dependency update

          ${{ steps.apply.outputs.apply_output }}

          ---
          *Generated by the weekly update-deps workflow. Review the diff and merge when ready.*
          EOF
          )"
